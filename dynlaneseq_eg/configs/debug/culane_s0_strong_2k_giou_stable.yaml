output_dir: outputs/debug_s0_strong_2k_giou_stable

dataset:
  name: CULane
  root: dataset
  lists:
    train: list/train_2k.txt
    val: list/test_2k.txt
    test: list/test_2k.txt
  min_valid_rows: 5
  cut_height: 270
  infer_seg_labels: true

augmentation:
  cut_height: 270
  horizontal_flip_prob: 0.5
  color_jitter: true
  channel_shuffle_prob: 0.05
  hue_saturation_prob: 0.3
  blur_prob: 0.1
  affine_prob: 0.0
  affine_translate_x: 0.0
  affine_translate_y: 0.0
  affine_rotate_deg: 0.0
  affine_scale_min: 1.0
  affine_scale_max: 1.0

dataloader:
  num_workers: 2
  pin_memory: true
  shuffle: true
  eval_batch_size: 1

model:
  name: DynLaneSeqS0
  input_h: 288
  input_w: 800
  fpn_channels: 128
  dim: 256
  pretrained_backbone: true
  freeze_backbone_bn: true
  num_slots: 20
  num_rows: 72
  x_bins: 200
  token_ignore_index: -100
  decoder_layers: 2
  row_decoder_layers: 2
  num_heads: 8
  decoder_ff_dim: 1024
  row_decoder_ff_dim: 512
  dropout: 0.1
  query_content_init: learned
  memory_value_with_pos: false
  seg_aux:
    enabled: true
    dropout: 0.1

matcher:
  lambda_obj: 2.0
  lambda_point: 5.0
  lambda_range: 1.0

loss:
  w_exist: 2.0
  w_point: 5.0
  w_range: 1.0
  w_smooth: 0.2
  w_line_iou: 0.5
  w_seg: 1.0
  line_iou_radius: 7.5
  seg_pos_weight: 4.0
  smooth_l1_beta: 0.01
  no_lane_weight: 1.0
  smoothness_contiguous: true

optimizer:
  base_lr: 0.0001
  backbone_lr: 0.00001
  weight_decay: 0.0001
  betas: [0.9, 0.999]

postprocess:
  lane_nms_distance_thresh_px: 20.0
  lane_nms_min_overlap_points: 5
  top_k: 4

training:
  batch_size: 4
  max_iters: 12000
  amp: true
  clip_grad_norm: 1.0
  log_interval: 50
  vis_interval: 500
  checkpoint_interval: 3000
