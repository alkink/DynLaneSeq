output_dir: outputs/debug_s0_100img

dataset:
  name: CULane
  root: dataset
  mode: overfit
  num_samples: 100
  lists:
    train: list/train_100.txt
    val: list/train_100.txt
  min_valid_rows: 5

augmentation:
  horizontal_flip_prob: 0.0
  color_jitter: false
  affine: false

dataloader:
  num_workers: 0
  pin_memory: true
  shuffle: true
  eval_batch_size: 1

model:
  name: DynLaneSeqS0
  input_h: 288
  input_w: 800
  fpn_channels: 128
  dim: 256
  pretrained_backbone: false
  num_slots: 20
  num_rows: 72
  x_bins: 200
  token_ignore_index: -100
  decoder_layers: 2
  row_decoder_layers: 2
  num_heads: 8
  decoder_ff_dim: 1024
  row_decoder_ff_dim: 512
  dropout: 0.1

matcher:
  lambda_obj: 2.0
  lambda_point: 5.0
  lambda_range: 1.0

loss:
  w_exist: 2.0
  w_point: 5.0
  w_range: 1.0
  w_smooth: 0.0
  smooth_l1_beta: 0.01
  no_lane_weight: 1.0

optimizer:
  base_lr: 0.0001
  backbone_lr: 0.00001
  weight_decay: 0.0001
  betas: [0.9, 0.999]

training:
  batch_size: 4
  max_iters: 6000
  amp: false
  clip_grad_norm: 1.0
  log_interval: 20
  vis_interval: 200
